name: Deploy to Firebase Hosting on PR
on: 
  pull_request:
    branches:
      - main
      - develop
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pnpm ci && pnpm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SCHEDULING_APPOINTMENTS_6DBE9 }}
          channelId: ${{ github.ref == 'refs/heads/main' && 'live' || 'qa' }}
          projectId: scheduling-appointments-6dbe9
